name: Release

permissions:
  contents: write

on:
  release:
    types: [published]

env:
  CARGO_TERM_COLOR: always
  GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: macos-latest
            features: astro-dnssd
          - os: ubuntu-24.04
            features: builtin-mdns
          - os: ubuntu-24.04-arm
            features: builtin-mdns

    runs-on: ${{ matrix.os }}

    steps:
    - uses: actions/checkout@v6.0.2
    - if: runner.os == 'Linux'
      run: sudo apt-get update && sudo apt-get install -y libdbus-1-dev pkg-config
    - run: rustup toolchain install 1.95 && rustup default 1.95
    - run: cargo build --verbose --release --no-default-features --features ${{ matrix.features }}
    - if: startsWith(matrix.os, 'macos')
      name: Upload binary
      env:
        ASSET: daikin-matter-${{ matrix.os }}
      run: |
        cp target/release/daikin-matter "$ASSET"
        gh release upload "$GITHUB_REF_NAME" "$ASSET" --clobber
    - if: startsWith(matrix.os, 'ubuntu')
      name: Build and upload .deb
      run: |
        cargo install cargo-deb --locked
        cargo deb -p daikin-matter --no-build
        gh release upload "$GITHUB_REF_NAME" target/debian/*.deb --clobber
